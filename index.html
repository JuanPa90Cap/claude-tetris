<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <table id="hs-table" class="hs-table"></table>
        <div id="hs-save-row" class="hidden">
          <input id="hs-name-input" type="text" maxlength="10" placeholder="Nombre" />
          <button id="hs-save-btn">Guardar</button>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="hs-start-screen" class="overlay">
      <div class="overlay-box">
        <p class="hs-heading">TETRIS</p>
        <div class="hs-stats">
          <div>
            <span class="label">MEJOR COMBO</span>
            <span class="value" id="hs-best-combo">0</span>
          </div>
          <div>
            <span class="label">MÁS LÍNEAS</span>
            <span class="value" id="hs-max-lines">0</span>
          </div>
        </div>
        <table id="hs-start-table" class="hs-table"></table>
        <button id="hs-start-btn">Jugar</button>
        <button id="hs-reset-btn">Reset records</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
